<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ジュニアマイスター 得点計算ツール</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F8FA;
    --surface: #FFFFFF;
    --surface2: #F0F2F5;
    --border: #E2E5EA;
    --border2: #C8CDD6;
    --text: #1A1D23;
    --text2: #5A6070;
    --text3: #8E96A4;
    --accent: #1A6B4A;
    --accent-bg: #E6F4EE;
    --accent-mid: #2E9E6E;
    --gold: #B8860B;
    --gold-bg: #FFF8E6;
    --gold-border: #E8C547;
    --silver: #5A6070;
    --silver-bg: #F0F2F5;
    --silver-border: #B0B8C4;
    --bronze: #8B4513;
    --bronze-bg: #FDF0E6;
    --bronze-border: #D4936A;
    --warn-bg: #FFF8E6;
    --warn-border: #E8C547;
    --warn-text: #7A5A00;
    --danger-bg: #FEF0F0;
    --danger-text: #8B2020;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
  }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  .site-header {
    background: var(--accent);
    color: #fff;
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .site-header-inner {
    max-width: 960px;
    margin: 0 auto;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .site-header .logo-mark {
    width: 36px;
    height: 36px;
    background: rgba(255,255,255,0.2);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }
  .site-header .site-title {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .site-header .site-sub {
    font-size: 11px;
    opacity: 0.75;
    margin-top: 1px;
  }

  /* ===== LAYOUT ===== */
  .page {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* ===== SCORE PANEL ===== */
  .score-panel {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-md);
    padding: 20px 24px 16px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .score-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent-mid), #4CC997);
  }
  .score-panel-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .score-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }
  .score-box {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    text-align: center;
  }
  .score-box .s-label {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 4px;
  }
  .score-box .s-value {
    font-size: 30px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .score-box .s-unit {
    font-size: 13px;
    color: var(--text2);
    margin-left: 2px;
  }
  .rank-display {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    border: 2px solid var(--border);
    background: var(--surface2);
    transition: all 0.25s;
  }
  .rank-display.bronze { background: var(--bronze-bg); border-color: var(--bronze-border); }
  .rank-display.silver { background: var(--silver-bg); border-color: var(--silver-border); }
  .rank-display.gold   { background: var(--gold-bg);   border-color: var(--gold-border); }
  .rank-icon {
    width: 30px;
    height: 30px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    transition: color 0.25s;
  }
  .rank-icon svg { width: 100%; height: 100%; display: block; }
  .rank-display.bronze .rank-icon { color: var(--bronze); }
  .rank-display.silver .rank-icon { color: var(--silver); }
  .rank-display.gold   .rank-icon { color: var(--gold); }
  .rank-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--text2);
    transition: color 0.25s;
  }
  .rank-display.bronze .rank-name { color: var(--bronze); }
  .rank-display.silver .rank-name { color: var(--silver); }
  .rank-display.gold   .rank-name { color: var(--gold); }
  .rank-desc {
    font-size: 12px;
    color: var(--text3);
    margin-top: 1px;
  }
  .progress-bar-wrap {
    margin-top: 14px;
  }
  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 5px;
  }
  .progress-bar {
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--accent-mid);
    transition: width 0.35s ease;
    min-width: 0;
  }
  .progress-markers {
    display: flex;
    position: relative;
    height: 14px;
    margin-top: 3px;
  }
  .progress-marker {
    position: absolute;
    font-size: 10px;
    color: var(--text3);
    transform: translateX(-50%);
  }

  /* ===== SELECTED LIST ===== */
  .selected-section {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    overflow: hidden;
    display: none;
  }
  .selected-section.visible { display: block; }
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  .section-head-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .count-badge {
    font-size: 11px;
    background: var(--accent-bg);
    color: var(--accent);
    padding: 2px 9px;
    border-radius: 20px;
    font-weight: 600;
  }
  .reset-btn {
    font-size: 12px;
    color: var(--text3);
    background: none;
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 4px 12px 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .reset-btn svg { width: 11px; height: 11px; flex-shrink: 0; }
  .reset-btn:hover { background: var(--danger-bg); color: var(--danger-text); border-color: #E88; }
  .selected-items {
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    max-height: 260px;
    overflow-y: auto;
  }
  .sel-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    font-size: 13px;
  }
  .sel-row .sel-name { flex: 1; color: var(--text); }
  .sel-row .sel-edu { font-size: 10px; color: var(--warn-text); background: var(--warn-bg); border: 1px solid var(--warn-border); padding: 1px 6px; border-radius: 10px; white-space: nowrap; }
  .sel-row .sel-pts { font-weight: 700; color: var(--accent); white-space: nowrap; }
  .sel-row .del-btn { cursor: pointer; color: var(--text3); background: none; border: none; width: 22px; height: 22px; padding: 0; border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: color 0.12s, background 0.12s; }
  .sel-row .del-btn svg { width: 13px; height: 13px; }
  .sel-row .del-btn:hover { color: var(--danger-text); background: rgba(139,32,32,0.08); }
  .warn-box {
    margin: 0 14px 10px;
    padding: 9px 13px;
    background: var(--warn-bg);
    border: 1px solid var(--warn-border);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--warn-text);
    display: none;
    align-items: flex-start;
    gap: 7px;
  }
  .warn-box.visible { display: flex; }
  .warn-box svg { width: 15px; height: 15px; flex-shrink: 0; margin-top: 1px; }

  /* ===== CATALOG ===== */
  .catalog-section {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .catalog-head {
    padding: 16px 18px 0;
  }
  .catalog-head h2 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 12px;
  }
  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }
  .search-wrap {
    flex: 1;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    padding: 9px 12px 9px 36px;
    font-size: 13px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  .search-wrap input:focus { border-color: var(--accent-mid); background: #fff; }
  .search-wrap .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    width: 15px;
    height: 15px;
    color: var(--text3);
    pointer-events: none;
    display: flex;
  }
  .search-wrap .search-icon svg { width: 100%; height: 100%; }
  .tabs-wrap {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    font-size: 12px;
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    cursor: pointer;
    color: var(--text2);
    background: var(--surface2);
    transition: all 0.15s;
    font-family: inherit;
  }
  .tab:hover { border-color: var(--accent-mid); color: var(--accent); background: var(--accent-bg); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

  .item-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 8px;
    padding: 14px;
  }
  .item {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 13px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    background: var(--surface);
    user-select: none;
  }
  .item:hover {
    border-color: var(--accent-mid);
    background: var(--accent-bg);
  }
  .item.selected {
    border-color: var(--accent);
    background: var(--accent-bg);
    box-shadow: 0 0 0 2px rgba(30,158,110,0.15);
  }
  .item-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }
  .item-check {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: #fff;
  }
  .item.selected .item-check {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .item-check::after {
    content: '';
    width: 10px;
    height: 6px;
    border-left: 2px solid transparent;
    border-bottom: 2px solid transparent;
    transform: rotate(-45deg) translate(1px, -1px);
    transition: border-color 0.15s;
  }
  .item.selected .item-check::after {
    border-left-color: #fff;
    border-bottom-color: #fff;
  }
  .item-name {
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
    flex: 1;
  }
  .pts-pill {
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .item.selected .pts-pill {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .item-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
    margin-left: 26px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .edu-tag {
    font-size: 10px;
    color: var(--warn-text);
    background: var(--warn-bg);
    border: 1px solid var(--warn-border);
    padding: 0px 5px;
    border-radius: 8px;
  }
  .empty-grid {
    padding: 32px;
    text-align: center;
    color: var(--text3);
    font-size: 13px;
  }

  /* ===== FOOTER ===== */
  .site-footer {
    text-align: center;
    padding: 32px 16px;
    font-size: 11px;
    color: var(--text3);
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 600px) {
    .score-grid { grid-template-columns: 1fr 1fr; }
    .score-box:last-child { display: none; }
    .item-grid { grid-template-columns: 1fr; }
    .site-header-inner { padding: 12px 14px; }
    .page { padding: 16px 10px 50px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <div class="logo-mark">JM</div>
    <div>
      <div class="site-title">ジュニアマイスター 得点計算ツール</div>
      <div class="site-sub">取得した資格・検定を選んで合計点と称号を確認</div>
    </div>
  </div>
</header>

<main class="page">

  <!-- スコアパネル -->
  <div class="score-panel">
    <div class="score-panel-title">現在のスコア</div>
    <div class="score-grid">
      <div class="score-box">
        <div class="s-label">合計得点</div>
        <div class="s-value" id="total-score">0<span class="s-unit">点</span></div>
      </div>
      <div class="score-box">
        <div class="s-label">技術系得点</div>
        <div class="s-value" id="tech-score">0<span class="s-unit">点</span></div>
      </div>
      <div class="score-box">
        <div class="s-label">選択数</div>
        <div class="s-value" id="sel-count-score">0<span class="s-unit">件</span></div>
      </div>
    </div>
    <div class="rank-display" id="rank-display">
      <div class="rank-icon" id="rank-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9" stroke-dasharray="3 3"/></svg></div>
      <div>
        <div class="rank-name" id="rank-name">まだ申請できません</div>
        <div class="rank-desc" id="rank-desc">教養系を除く技術系得点が20点以上になると申請可能</div>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-labels">
        <span>0点</span><span>ブロンズ 20点</span><span>シルバー 30点</span><span>ゴールド 45点</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- 選択済みリスト -->
  <div class="selected-section" id="selected-section">
    <div class="section-head">
      <div class="section-head-title">
        選択済みの資格・検定
        <span class="count-badge" id="sel-count-badge">0件</span>
      </div>
      <button class="reset-btn" onclick="resetAll()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg>すべてリセット</button>
    </div>
    <div class="selected-items" id="selected-list"></div>
    <div class="warn-box" id="warn-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.7 2.5 20h19L12 3.7z"/><line x1="12" y1="9.5" x2="12" y2="14"/><circle cx="12" cy="17" r="1" fill="currentColor" stroke="none"/></svg>
      <span>申請には教養系を除く技術系合計が<strong>20点以上</strong>必要です。現在の技術系得点：<strong id="warn-tech">0</strong>点</span>
    </div>
  </div>

  <!-- カタログ -->
  <div class="catalog-section">
    <div class="catalog-head">
      <h2>資格・検定・コンテストを選択</h2>
      <div class="search-row">
        <div class="search-wrap">
          <span class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
          <input type="text" id="search" placeholder="資格名・団体名で検索..." oninput="filterItems()">
        </div>
      </div>
      <div class="tabs-wrap" id="cat-tabs"></div>
    </div>
    <div class="item-grid" id="item-grid"></div>
  </div>

</main>

<footer class="site-footer">
  本ツールは令和8年度区分表をもとに作成しています。申請時は必ず公式実施要項・区分表を確認してください。<br>
  公益社団法人 全国工業高等学校長協会 &nbsp;|&nbsp; <a href="https://zenkoukyo.or.jp/index_jm/" target="_blank" style="color:inherit">公式サイト</a>
</footer>

const CATS = ["すべて","全工協","電気系","情報系","機械系","建築・土木","デザイン系","消防・危険物","通信・無線","環境・化学","コンテスト","コンクール","教養系","その他"];

let selected = new Set();
let currentCat = "すべて";
let searchVal = "";

function init() {
  const tabs = document.getElementById("cat-tabs");
  CATS.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "tab" + (c === currentCat ? " active" : "");
    btn.textContent = c;
    btn.onclick = () => {
      currentCat = c;
      document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.textContent === c));
      render();
    };
    tabs.appendChild(btn);
  });
  render();
  updateScores();
}

function getFiltered() {
  return DATA.filter(d => {
    const matchCat = currentCat === "すべて" || d.cat === currentCat;
    const q = searchVal.toLowerCase();
    const matchSearch = !q || d.name.toLowerCase().includes(q) || d.note.toLowerCase().includes(q) || d.cat.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });
}

function render() {
  const grid = document.getElementById("item-grid");
  const items = getFiltered();
  if (!items.length) {
    grid.innerHTML = '<div class="empty-grid">該当する資格・検定が見つかりません</div>';
    return;
  }
  grid.innerHTML = items.map(d => {
    const sel = selected.has(d.id);
    const eduTag = d.subcat === "教養" ? '<span class="edu-tag">教養系</span>' : "";
    return `<div class="item${sel ? " selected" : ""}" onclick="toggle(${d.id})" tabindex="0" role="checkbox" aria-checked="${sel}">
      <div class="item-top">
        <span class="item-check" aria-hidden="true"></span>
        <span class="item-name">${d.name}</span>
        <span class="pts-pill">${d.pts}点</span>
      </div>
      <div class="item-sub">${d.note} ${eduTag}</div>
    </div>`;
  }).join("");
}

function toggle(id) {
  if (selected.has(id)) selected.delete(id);
  else selected.add(id);
  updateScores();
  render();
  renderSelected();
}

function resetAll() {
  selected.clear();
  updateScores();
  render();
  renderSelected();
}

function filterItems() {
  searchVal = document.getElementById("search").value.trim();
  render();
}

function updateScores() {
  const selItems = DATA.filter(d => selected.has(d.id));
  const total = selItems.reduce((s, d) => s + d.pts, 0);
  const tech  = selItems.filter(d => d.subcat !== "教養").reduce((s, d) => s + d.pts, 0);

  document.getElementById("total-score").innerHTML = `${total}<span class="s-unit">点</span>`;
  document.getElementById("tech-score").innerHTML  = `${tech}<span class="s-unit">点</span>`;
  document.getElementById("sel-count-score").innerHTML = `${selected.size}<span class="s-unit">件</span>`;

  const rd   = document.getElementById("rank-display");
  const icon = document.getElementById("rank-icon");
  const name = document.getElementById("rank-name");
  const desc = document.getElementById("rank-desc");
  const fill = document.getElementById("progress-fill");

  rd.className = "rank-display";
  if (tech < 20) {
    icon.innerHTML = ICON_NEUTRAL;
    name.textContent = "まだ申請できません";
    desc.textContent = `教養系を除く技術系得点が20点以上になると申請可能（現在${tech}点）`;
  } else if (total >= 45) {
    rd.classList.add("gold");
    icon.innerHTML = ICON_MEDAL;
    name.textContent = "ジュニアマイスター ゴールド";
    desc.textContent = "45点以上達成！最高称号です";
  } else if (total >= 30) {
    rd.classList.add("silver");
    icon.innerHTML = ICON_MEDAL;
    name.textContent = "ジュニアマイスター シルバー";
    desc.textContent = `ゴールドまであと${45 - total}点`;
  } else if (total >= 20) {
    rd.classList.add("bronze");
    icon.innerHTML = ICON_MEDAL;
    name.textContent = "ジュニアマイスター ブロンズ";
    desc.textContent = `シルバーまであと${30 - total}点`;
  } else {
    icon.innerHTML = ICON_NEUTRAL;
    name.textContent = "まだ申請できません";
    desc.textContent = `合計20点以上になると申請可能（技術系${tech}点 / 合計${total}点）`;
  }

  const pct = Math.min(100, Math.round(total / 60 * 100));
  fill.style.width = pct + "%";
}

function renderSelected() {
  const selItems = DATA.filter(d => selected.has(d.id));
  const sec  = document.getElementById("selected-section");
  const list = document.getElementById("selected-list");
  const badge = document.getElementById("sel-count-badge");
  const warn  = document.getElementById("warn-box");
  const warnTech = document.getElementById("warn-tech");

  sec.classList.toggle("visible", selItems.length > 0);
  badge.textContent = selItems.length + "件";

  const tech = selItems.filter(d => d.subcat !== "教養").reduce((s, d) => s + d.pts, 0);
  warn.classList.toggle("visible", selItems.length > 0 && tech < 20);
  warnTech.textContent = tech;

  list.innerHTML = selItems.map(d => {
    const eduTag = d.subcat === "教養" ? '<span class="sel-edu">教養系</span>' : "";
    return `<div class="sel-row">
      <span class="sel-name">${d.name}</span>
      ${eduTag}
      <span class="sel-pts">+${d.pts}点</span>
      <button class="del-btn" onclick="toggle(${d.id})" title="${d.name}を削除" aria-label="${d.name}を削除">${ICON_CLOSE}</button>
    </div>`;
  }).join("");
}

document.getElementById("search").addEventListener("keydown", e => {
  if (e.key === "Escape") { e.target.value = ""; searchVal = ""; render(); }
});

init();
</script>
